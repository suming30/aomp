server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: aomp-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aomp?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.lsm.aomp.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

aomp:
  jwt:
    secret: aomp-secret-key-2026-autoops-platform-jwt-token-signing
    expiration: 86400000
    header: Authorization
    prefix: "Bearer "
  security:
    login-max-retry: 5
    lock-duration-minutes: 15
    session-timeout-minutes: 30
    password-expire-days: 90
    password-history-count: 3
  ssh:
    connect-timeout: 10000
    channel-timeout: 30000
